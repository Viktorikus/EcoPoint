# EcoPoint Custom WAF Rules

# Rule 1001: Blokir akses langsung ke API internal tanpa header Content-Type yang benar
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1001,phase:1,deny,status:403,log,\
    msg:'API access without proper Content-Type',\
    chain"
    SecRule REQUEST_METHOD "@rx ^(POST|PUT|PATCH)$" \
        "chain"
        SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/json"

# Rule 1002: Blokir path traversal di file upload endpoint
SecRule REQUEST_URI "@contains /api/admin/rewards/upload" \
    "id:1002,phase:2,deny,status:403,log,\
    msg:'Path traversal attempt in upload',\
    chain"
    SecRule FILES_NAMES "@rx (\.\.\/|\.\.\\)" ""

# Rule 1003: Rate limit sederhana — blokir jika ada lebih dari 10 request /redeem dalam 60 detik
# (ModSecurity IP collection sebagai pelengkap rate limit di middleware.ts)
SecAction \
    "id:1003,phase:1,pass,nolog,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.req_counter=+1,\
    expirevar:ip.req_counter=60"
SecRule IP:REQ_COUNTER "@gt 30" \
    "id:1004,phase:1,deny,status:429,log,\
    msg:'Rate limit exceeded',\
    tag:'ECOPOINT/RATELIMIT'"

# Rule 1005: Blokir SQL Injection patterns (melengkapi OWASP CRS)
SecRule ARGS "@detectSQLi" \
    "id:1005,phase:2,deny,status:403,log,\
    msg:'SQL Injection attempt detected',\
    tag:'ECOPOINT/SQLI'"

# Rule 1006: Blokir akses ke file sensitif
SecRule REQUEST_URI "@rx \.(env|git|sql|bak|backup|config)$" \
    "id:1006,phase:1,deny,status:404,log,\
    msg:'Sensitive file access blocked'"

# Whitelist: Izinkan file upload legitimate (image/jpeg, image/png, image/webp saja)
SecRule REQUEST_URI "@contains /api/admin/rewards/upload" \
    "id:1007,phase:2,allow,\
    msg:'Legitimate image upload',\
    chain"
    SecRule FILES_TMPNAMES "@gt 0" \
        "chain"
        SecRule FILES:Content-Type "@rx ^image\/(jpeg|png|webp)$" ""
