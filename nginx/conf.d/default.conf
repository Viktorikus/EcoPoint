# Rate limiting zone untuk endpoint API auth (max 10 req/menit per IP)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name localhost; # Ganti dengan domain Anda
    
    # Redirection
    return 301 https://$host$request_uri;
}

# Konfigurasi Server HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name localhost; # Ganti dengan domain Anda

    # Placeholder untuk path SSL (buat cert dengan Let's Encrypt / self-signed di server asli)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Batas ukuran upload (misal untuk gambar laporan)
    client_max_body_size 10M;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block akses ke file sensitif
    location ~ /\.(env|git|svn|ht) {
        deny all;
        return 404;
    }

    # Rate limiting khusus untuk rute Auth
    location ^~ /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://app:3000;
        
        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy utama ke aplikasi Next.js (port 3000 di container 'app')
    location / {
        proxy_pass http://app:3000;
        
        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
