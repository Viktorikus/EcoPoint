name: Security Pipeline

# Trigger workflow ketika ada push atau pull_request ke branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Audit Keamanan Dependensi
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      # Menjalankan npm audit untuk mencari vulnerability (continue-on-error agar pipeline tidak berhenti jika ada warning)
      - name: Run NPM Audit (High Vulnerabilities)
        run: npm audit --audit-level=high > audit-report.txt || true
        continue-on-error: true
        
      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.txt

  # Job 2: Static Analysis (Code Quality)
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      # Mengecek error TypeScript (continue-on-error agar report tetap lanjut)
      - name: TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: true
        
      # Mengecek standard kode dengan ESLint
      - name: ESLint Check
        run: npx eslint . --ext .ts,.tsx
        continue-on-error: true

  # Job 3: Build & Integration Test
  build-test:
    name: Next.js Build Test
    runs-on: ubuntu-latest
    needs: [dependency-audit, code-quality]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm install
        
      # Test build Next.js memastikan aplikasi bisa dicompile
      - name: Build Next.js Application
        run: npm run build
        env:
          NEXTAUTH_SECRET: "test-secret-for-ci-minimum-32-chars-long"
          NEXTAUTH_URL: "http://localhost:3000"
          DATABASE_URL: "mysql://root:password@localhost:3306/ecopoint"
          DB_HOST: "localhost"
          DB_USER: "root"
          DB_PASSWORD: "password"
          DB_NAME: "ecopoint"
          DB_PORT: "3306"

  # Job 4: Verifikasi Docker Build
  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Build image Docker untuk memastikan Dockerfile valid secara syntax dan environment
      - name: Build Docker Image
        run: docker build -t ecopoint-test .
