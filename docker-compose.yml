version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecopoint_app
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - db
    # Security: Read-only root filesystem
    read_only: true
    # Mount tmpfs untuk direktori yang butuh write access (cache Next.js)
    tmpfs:
      - /tmp
      - /app/.next/cache
    # Tidak di-expose ke publik (port 3000 hanya tersedia di internal network)
    expose:
      - "3000"
    networks:
      - ecopoint_network

  db:
    image: mysql:8.0
    container_name: ecopoint_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-ecopoint_root_secure}
      MYSQL_DATABASE: ecopoint
      MYSQL_USER: ecopoint_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-ecopoint_secure_pw}
    # Command tambahan untuk optimasi dan otentikasi MySQL 8.0
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    volumes:
      - db_data:/var/lib/mysql
    # Security: Database HANYA diakses via network internal, JANGAN EXPOSE PORT 3306 ke host
    networks:
      - ecopoint_network

  nginx:
    image: nginx:alpine
    container_name: ecopoint_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Mount untuk SSL certificates (readonly)
    networks:
      - ecopoint_network

networks:
  ecopoint_network:
    driver: bridge

volumes:
  # Named volume untuk persistent storage database (disarankan daripada bind mount)
  db_data:
